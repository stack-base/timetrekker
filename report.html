<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Report - TimeTrekker</title>
    <meta name="theme-color" content="#09090b">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: '#ff5757',
                        dark: { bg: '#09090b', card: '#18181b', border: '#27272a' }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-dark-bg text-white h-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <div class="flex flex-col items-center justify-center space-y-4 animate-pulse z-10 relative">
        <div class="w-16 h-16 rounded-2xl bg-dark-card border border-dark-border shadow-2xl flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 bg-brand/20 blur-xl"></div>
            <i class="ph-fill ph-mountains text-brand text-3xl relative z-10"></i>
        </div>
        <h2 class="text-xl font-bold tracking-tight">Compiling Report</h2>
        <p class="text-sm text-zinc-400">Please wait while your PDF is generated...</p>
    </div>

    <div id="pdf-container" style="position: absolute; top: -9999px; left: -9999px; width: 800px; background: white; color: black; padding: 40px; font-family: 'Inter', sans-serif;">
        </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rawData = localStorage.getItem('timetrekker_report_cache');
            if (!rawData) {
                alert("No task data found. Returning to app.");
                window.history.back();
                return;
            }

            const tasks = JSON.parse(rawData);
            
            // Smart Sorting Logic
            const getDayStr = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            const today = getDayStr(new Date());
            
            const pending = tasks.filter(t => t.status === 'todo');
            const completed = tasks.filter(t => t.status === 'done');
            const priMap = { high: 3, med: 2, low: 1, none: 0 };

            const urgentTasks = pending.filter(t => !t.dueDate || t.dueDate <= today)
                .sort((a, b) => priMap[b.priority || 'none'] - priMap[a.priority || 'none']);
            
            const upcomingTasks = pending.filter(t => t.dueDate > today)
                .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            completed.sort((a, b) => new Date(b.completedAt || 0) - new Date(a.completedAt || 0));

            const escapeHTML = (str) => {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            };

            const buildRows = (taskList) => taskList.map(t => `
                <tr style="border-bottom: 1px solid #e4e4e7;">
                    <td style="padding: 12px 8px; font-weight: 500; color: #18181b;">${escapeHTML(t.title)}</td>
                    <td style="padding: 12px 8px; color: #52525b; font-size: 12px;">${escapeHTML(t.project || 'Inbox')}</td>
                    <td style="padding: 12px 8px; color: #52525b; font-size: 12px;">${t.dueDate ? new Date(t.dueDate).toLocaleDateString() : '-'}</td>
                    <td style="padding: 12px 8px; font-size: 12px;">
                        ${t.priority === 'high' ? '<span style="color: #ef4444; font-weight: bold;">High</span>' : 
                          t.priority === 'med' ? '<span style="color: #eab308; font-weight: 600;">Med</span>' : 
                          t.priority === 'low' ? '<span style="color: #3b82f6; font-weight: 600;">Low</span>' : '-'}
                    </td>
                </tr>
            `).join('');

            const container = document.getElementById('pdf-container');
            container.innerHTML = `
                <div style="border-bottom: 2px solid #18181b; padding-bottom: 16px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1 style="font-size: 24px; font-weight: bold; margin: 0; color: #18181b; letter-spacing: -0.025em;">TimeTrekker Status Report</h1>
                        <p style="margin: 4px 0 0 0; color: #71717a; font-size: 14px;">Generated on ${new Date().toLocaleString()}</p>
                    </div>
                    <div style="text-align: right; color: #71717a; font-size: 14px;">
                        <strong>${pending.length}</strong> Pending &bull; <strong>${completed.length}</strong> Completed
                    </div>
                </div>

                ${urgentTasks.length > 0 ? `
                    <h2 style="font-size: 16px; font-weight: bold; color: #ef4444; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;">Action Required (Today & Overdue)</h2>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 32px; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #e4e4e7; color: #71717a; font-size: 12px; text-transform: uppercase;">
                                <th style="padding: 8px;">Task</th><th style="padding: 8px;">Project</th><th style="padding: 8px;">Due</th><th style="padding: 8px;">Priority</th>
                            </tr>
                        </thead>
                        <tbody>${buildRows(urgentTasks)}</tbody>
                    </table>
                ` : ''}

                ${upcomingTasks.length > 0 ? `
                    <h2 style="font-size: 16px; font-weight: bold; color: #3b82f6; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;">Upcoming Tasks</h2>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 32px; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #e4e4e7; color: #71717a; font-size: 12px; text-transform: uppercase;">
                                <th style="padding: 8px;">Task</th><th style="padding: 8px;">Project</th><th style="padding: 8px;">Due</th><th style="padding: 8px;">Priority</th>
                            </tr>
                        </thead>
                        <tbody>${buildRows(upcomingTasks)}</tbody>
                    </table>
                ` : ''}

                ${completed.length > 0 ? `
                    <h2 style="font-size: 16px; font-weight: bold; color: #10b981; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;">Recently Completed</h2>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 32px; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #e4e4e7; color: #71717a; font-size: 12px; text-transform: uppercase;">
                                <th style="padding: 8px;">Task</th><th style="padding: 8px;">Project</th><th style="padding: 8px;">Due</th><th style="padding: 8px;">Priority</th>
                            </tr>
                        </thead>
                        <tbody>${buildRows(completed.slice(0, 40))}</tbody>
                    </table>
                ` : ''}
            `;

            const opt = {
                margin:       0.5,
                filename:     `TimeTrekker_Report_${today}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            // Allow a small rendering tick, then generate and step back
            setTimeout(() => {
                html2pdf().set(opt).from(container).save().then(() => {
                    // Clear cache to keep storage clean
                    localStorage.removeItem('timetrekker_report_cache');
                    // Route user right back to where they were
                    window.history.back();
                });
            }, 500);
        });
    </script>
</body>
</html>
