<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiling Report - TimeTrekker</title>
    <meta name="theme-color" content="#09090b">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#ff5757', dark: { bg: '#09090b', card: '#18181b', border: '#27272a' } }
                }
            }
        };
    </script>
</head>
<body class="bg-dark-bg text-white h-screen flex flex-col items-center justify-center overflow-hidden font-sans selection:bg-brand/30">

    <div class="flex flex-col items-center justify-center space-y-6 z-10 relative">
        <div class="relative flex items-center justify-center w-20 h-20">
            <div class="absolute inset-0 bg-brand/20 rounded-full blur-xl animate-pulse"></div>
            <div class="w-16 h-16 rounded-2xl bg-dark-card border border-white/10 shadow-2xl flex items-center justify-center relative overflow-hidden z-10 animate-bounce" style="animation-duration: 2s;">
                <i class="ph-fill ph-files text-brand text-3xl relative z-10"></i>
            </div>
            <svg class="animate-spin absolute w-24 h-24 text-brand/30" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
        <div class="text-center">
            <h2 class="text-xl font-bold tracking-tight text-white mb-1">Compiling Intelligence Report</h2>
            <p class="text-sm text-zinc-500 font-medium">Structuring telemetry & tasks. Please wait...</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rawData = localStorage.getItem('timetrekker_report_cache');
            if (!rawData) {
                alert("No task data found in cache. Returning to app.");
                window.history.back();
                return;
            }

            const tasks = JSON.parse(rawData);
            
            // Smart Sorting Logic
            const getDayStr = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            const today = getDayStr(new Date());
            
            const pending = tasks.filter(t => t.status === 'todo');
            const completed = tasks.filter(t => t.status === 'done');
            
            const priMap = { high: 3, med: 2, low: 1, none: 0 };
            
            const urgentTasks = pending.filter(t => !t.dueDate || t.dueDate <= today)
                .sort((a, b) => priMap[b.priority || 'none'] - priMap[a.priority || 'none']);
            
            const upcomingTasks = pending.filter(t => t.dueDate > today)
                .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            completed.sort((a, b) => new Date(b.completedAt || 0) - new Date(a.completedAt || 0));

            // Small delay to allow the loading animation to render smoothly
            setTimeout(() => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
                
                const margin = 14;
                const pageWidth = doc.internal.pageSize.width;
                const brandColor = [255, 87, 87];
                let currentY = 20;

                // --- HEADER ---
                doc.setFillColor(...brandColor);
                doc.rect(0, 0, pageWidth, 4, 'F');
                
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(22);
                doc.setTextColor(15, 23, 42);
                doc.text("TimeTrekker", margin, currentY);
                
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139);
                doc.text(`Operational Status Report • Generated ${new Date().toLocaleString()}`, margin, currentY + 6);
                currentY += 18;

                // --- KPI CARDS ---
                const drawKPI = (x, y, w, title, val) => {
                    doc.setFillColor(248, 250, 252);
                    doc.rect(x, y, w, 20, 'F');
                    doc.setDrawColor(226, 232, 240);
                    doc.setLineWidth(0.5);
                    doc.rect(x, y, w, 20, 'S');
                    
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(7);
                    doc.setTextColor(100, 116, 139);
                    doc.text(title.toUpperCase(), x + 4, y + 6);
                    
                    doc.setFontSize(14);
                    doc.setTextColor(15, 23, 42);
                    doc.text(val.toString(), x + 4, y + 15);
                };

                const cardW = (pageWidth - (margin * 2) - 8) / 3;
                drawKPI(margin, currentY, cardW, "Total Pending", pending.length);
                drawKPI(margin + cardW + 4, currentY, cardW, "Action Required", urgentTasks.length);
                drawKPI(margin + (cardW * 2) + 8, currentY, cardW, "Recently Completed", completed.length);
                currentY += 32;

                // --- TABLE STYLES ---
                const tableStyles = {
                    theme: 'grid',
                    styles: { font: 'helvetica', fontSize: 9, cellPadding: 3, textColor: [51, 65, 85], lineColor: [226, 232, 240], lineWidth: 0.1 },
                    headStyles: { fillColor: [248, 250, 252], textColor: [15, 23, 42], fontStyle: 'bold' },
                    margin: { left: margin, right: margin }
                };

                const formatRow = (t) => [
                    t.title,
                    t.project || 'Inbox',
                    t.dueDate || '-',
                    t.priority ? t.priority.toUpperCase() : 'NONE'
                ];

                // --- URGENT TASKS ---
                if (urgentTasks.length > 0) {
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.setTextColor(239, 68, 68); // Red
                    doc.text("ACTION REQUIRED (TODAY & OVERDUE)", margin, currentY);
                    
                    doc.autoTable({
                        startY: currentY + 4,
                        head: [['Task Directive', 'Project', 'Due Date', 'Priority']],
                        body: urgentTasks.map(formatRow),
                        ...tableStyles
                    });
                    currentY = doc.lastAutoTable.finalY + 12;
                }

                // --- UPCOMING TASKS ---
                if (upcomingTasks.length > 0) {
                    if (currentY > 250) { doc.addPage(); currentY = 20; }
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.setTextColor(59, 130, 246); // Blue
                    doc.text("UPCOMING DIRECTIVES", margin, currentY);
                    
                    doc.autoTable({
                        startY: currentY + 4,
                        head: [['Task Directive', 'Project', 'Due Date', 'Priority']],
                        body: upcomingTasks.map(formatRow),
                        ...tableStyles
                    });
                    currentY = doc.lastAutoTable.finalY + 12;
                }

                // --- COMPLETED TASKS ---
                if (completed.length > 0) {
                    if (currentY > 250) { doc.addPage(); currentY = 20; }
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.setTextColor(16, 185, 129); // Green
                    doc.text("RECENTLY COMPLETED (TOP 30)", margin, currentY);
                    
                    doc.autoTable({
                        startY: currentY + 4,
                        head: [['Task Directive', 'Project', 'Completion Date', 'Priority']],
                        body: completed.slice(0, 30).map(t => {
                            const row = formatRow(t);
                            row[2] = t.completedAt ? new Date(t.completedAt).toLocaleDateString() : '-';
                            return row;
                        }),
                        ...tableStyles
                    });
                }

                // --- FOOTER ---
                const pageCount = doc.internal.getNumberOfPages();
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(148, 163, 184);
                    doc.text(`TimeTrekker PDF Module`, margin, doc.internal.pageSize.height - 10);
                    doc.text(`Page ${i} of ${pageCount}`, pageWidth - margin, doc.internal.pageSize.height - 10, { align: 'right' });
                }

                // --- SAVE AND ROUTE BACK ---
                doc.save(`TimeTrekker_Status_${today}.pdf`);
                
                // Clear the cache to prevent memory bloat
                localStorage.removeItem('timetrekker_report_cache');
                
                // Instantly bounce back to the app seamlessly
                window.history.back();

            }, 800); // 800ms delay ensures the loading UI renders and feels intentional
        });
    </script>
</body>
</html>
