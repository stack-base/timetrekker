<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Offline | TimeTrekker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background-color: #09090b;
            border: 1px solid #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(255, 87, 87, 0.1);
        }
        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #ff5757;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.025em;
        }
        p {
            color: #a1a1aa;
            font-size: 0.875rem;
            line-height: 1.5;
            margin: 0 0 32px 0;
            max-width: 280px;
        }
        button {
            background-color: #ff5757;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 87, 87, 0.25);
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <svg viewBox="0 0 24 24">
            <line x1="2" y1="2" x2="22" y2="22"></line>
            <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
            <path d="M5 13a10 10 0 0 1 14 0"></path>
            <path d="M2 8.5a15 15 0 0 1 20 0"></path>
        </svg>
    </div>
    <h1>You are offline</h1>
    <p>TimeTrekker needs an active internet connection to sync your tasks and analytics.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
